<html lang="en">

      content="website" />

      property="og:url"

    <meta

      content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tomas Halling" />
    <meta
      name="twitter:description"
      content="Swedish show artist, musician, composer, and visual artist. Since 1975, creating extraordinary worlds through improvisation, music performance, comedy, cabaret, and fantastical costume design." />
    <meta
      name="twitter:image"
      content="https://tomashalling.se/assets/img/xgloscho.jpeg" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet" /></noscript>
    <link rel="icon" type="image/svg+xml" href="assets/svg/3Spriketto.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#1a3a40" />
    <link
      rel="stylesheet"
      href="assets/css/style.css?v=17" />
  </head>
  <body>
    <h1 class="site-title" aria-label="Tomas Halling">
      <span class="site-title-letters">
        <img src="assets/svg/letterT.svg" alt="T" class="title-letter" />
        <img src="assets/svg/letterO.svg" alt="O" class="title-letter" />
        <img src="assets/svg/letterM.svg" alt="M" class="title-letter" />
        <img src="assets/svg/letterA1.svg" alt="A" class="title-letter" />
        <img src="assets/svg/letterS.svg" alt="S" class="title-letter" />
        <span class="title-letter-space"></span>
        <img src="assets/svg/letterH.svg" alt="H" class="title-letter" />
        <img src="assets/svg/letterA2.svg" alt="A" class="title-letter" />
        <img src="assets/svg/letterL1.svg" alt="L" class="title-letter" />
        <img src="assets/svg/letterL2.svg" alt="L" class="title-letter" />
        <img src="assets/svg/letterI.svg" alt="I" class="title-letter" />
        <img src="assets/svg/letterN.svg" alt="N" class="title-letter" />
        <img src="assets/svg/letterG.svg" alt="G" class="title-letter" />
      </span>
    </h1>
    <div
      class="viewport"
      id="viewport">
      <main
        class="artwork"
        id="artwork"
        aria-label="Interactive artwork by Tomas Halling">
        <div
          class="artwork-item x-14 y-18 w-7 h-5"
          data-sound="assets/audio/7Piano.mp3">
          <img src="assets/svg/7Piano.svg" alt="Piano creature" />
        </div>
        <a
          href="https://docs.google.com/document/d/1MMRRXbYMeeVk50FM0Pr2nPE6ce9Ow_TqRXcznx18YEA/export?format=pdf"
          class="artwork-item nav-creature x-3 y-2 w-5 h-8"
          data-nav="cv"
          data-sound="assets/audio/2Gungus.mp3"
          target="_blank">
          <span class="nav-label">CV</span>
          <img src="assets/svg/2Gungus.svg" alt="Gungus creature" />
        </a>
        <a
          href="https://instagram.com/tomashallingandxgloscho/"
          class="artwork-item nav-creature x-3 y-16 w-6 h-8"
          data-nav="instagram"
          data-sound="assets/audio/9Vingtubfötter.mp3"
          target="_blank">
          <span class="nav-label">Instagram</span>
          <video
            src="assets/svg/9Vingtubfötter.mp4"
            autoplay
            loop
            muted
            playsinline></video>
        </a>
        <div
          class="artwork-item x-18 y-12 w-6 h-6"
          data-sound="assets/audio/6Vindruvsskepp.mp3">
          <video
            src="assets/svg/6Vindruveskeppet.mp4"
            autoplay
            loop
            muted
            playsinline></video>
        </div>
        <div
          class="artwork-item x-2 y-11 w-4 h-6"
          data-sound="assets/audio/10Klotving.mp3">
          <img src="assets/svg/10Klotving.svg" alt="Klotving creature" />
        </div>
        <div
          class="artwork-item x-11 y-2 w-4 h-4"
          data-sound="assets/audio/3Spriketto.mp3">
          <img src="assets/svg/3Spriketto.svg" alt="Spriketto creature" />
        </div>
        <div
          class="artwork-item x-15 y-2 w-5 h-5"
          data-sound="assets/audio/4SvävandeGrenholk.mp3">
          <img src="assets/svg/4SvävandeGrenholk.svg" alt="Svävande Grenholk creature" />
        </div>
        <a
          href="mailto:info@tomashalling.se"
          class="artwork-item nav-creature x-20 y-4 w-4 h-6"
          data-nav="contact"
          data-sound="assets/audio/5Elker.mp3">
          <span class="nav-label">Kontakt</span>
          <img src="assets/svg/5Elker.svg" alt="Elker creature" />
        </a>
        <a
          href="#galleri"
          class="artwork-item nav-creature fixed-center x-8 y-8 w-10 h-10"
          data-nav="galleri"
          data-sound="assets/audio/1Kataklyzmozz.mp3">
          <span class="nav-label">Galleri</span>
          <img src="assets/svg/1Kataklysmozz.svg" alt="Kataklysmozz creature" />
        </a>
        <div
          class="artwork-item x-10 y-17 w-4 h-6"
          data-sound="assets/audio/8Vingtub.mp3">
          <img src="assets/svg/8Vingtub.svg" alt="Vingtub creature" />
        </div>
      </main>
    </div>

    <!-- Gallery overlay -->
    <div class="gallery-overlay" id="gallery-overlay">


      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" aria-label="Stäng">&times;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>

    <script src="assets/js/config.js?v=17"></script>
    <script src="assets/js/sound.js?v=17"></script>
    <script src="assets/js/panZoom.js?v=17"></script>
    <script src="assets/js/artwork.js?v=17"></script>
    <script src="assets/js/particles.js?v=17"></script>
    <script src="assets/js/effects.js?v=17"></script>
    <script src="assets/js/explode.js?v=17"></script>
    <script src="assets/js/nav.js?v=17"></script>
    <script src="assets/js/gallery.js?v=17"></script>
    <script src="assets/js/video.js?v=17"></script>
  </body>
</html>
